<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>نظام الفصول الدراسية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f8f7; --surface:#ffffff; --surface-2:#eef4f3;
  --brand:#0f766e; --brand-2:#0b5a54; --accent:#0f766e; --accent-d:#0b5a54;
  --ink:#15242b; --muted:#5b6f76; --line:#d8e2e0;
  --danger:#d64545; --danger-d:#b5332e; --warn:#c9870a; --ok:#1f9d55;
  --r:16px; --r-sm:11px; --shadow:0 1px 2px rgba(16,40,40,.06),0 8px 24px rgba(16,40,40,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Tajawal',"Segoe UI",Tahoma,system-ui,sans-serif;background:var(--bg);color:var(--ink);
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;
}
button{font-family:inherit;cursor:pointer;border:none}
input,select{font-family:inherit;font-size:15px}
.hidden{display:none !important}

/* ===== Login ===== */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}
.auth-card{
  width:100%;max-width:400px;background:var(--surface);border-radius:22px;
  box-shadow:var(--shadow);padding:34px 26px 30px;border:1px solid var(--line);
}
.brand-mark{
  width:64px;height:64px;border-radius:18px;margin:0 auto 16px;display:flex;
  align-items:center;justify-content:center;
  background:linear-gradient(150deg,var(--brand),var(--brand-2));color:#fff;font-weight:800;font-size:26px;
}
.auth-card h1{margin:0 0 4px;text-align:center;font-size:21px;font-weight:800}
.auth-sub{text-align:center;color:var(--muted);margin:0 0 24px;font-size:13.5px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
.field input,.field select{
  width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:var(--r-sm);
  background:var(--surface-2);transition:border-color .15s,background .15s;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);background:#fff}
.btn{
  width:100%;padding:14px;border-radius:var(--r-sm);font-weight:700;font-size:15.5px;
  background:var(--accent);color:#fff;transition:background .15s,transform .05s;
}
.btn:active{transform:scale(.99)}
.btn:hover{background:var(--accent-d)}
.btn.secondary{background:var(--surface-2);color:var(--brand);border:1.5px solid var(--line)}
.btn.secondary:hover{background:#EEF2F7}
.btn.danger{background:var(--danger)}.btn.danger:hover{background:var(--danger-d)}
.btn.sm{width:auto;padding:9px 16px;font-size:14px;border-radius:9px}
.btn.ghost{background:transparent;color:var(--muted);width:auto;padding:8px 12px;font-size:13.5px}
.alert{padding:11px 14px;border-radius:10px;font-size:13.5px;margin-bottom:14px;font-weight:500}
.alert.err{background:#FDECEB;color:var(--danger-d)}
.alert.ok{background:#E5F6F3;color:var(--accent-d)}
.alert.warn{background:#FCF2E2;color:#9A6212}

/* ===== App shell ===== */
.topbar{
  position:sticky;top:0;z-index:30;background:var(--brand);color:#fff;
  padding:12px 16px;display:flex;align-items:center;gap:12px;
}
.topbar .tb-title{font-weight:800;font-size:16px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-badge{background:rgba(255,255,255,.14);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.tb-menu-btn{background:rgba(255,255,255,.14);color:#fff;width:38px;height:38px;border-radius:11px;font-size:17px;display:flex;align-items:center;justify-content:center}
.tabbar{
  position:sticky;top:62px;z-index:20;background:var(--surface);border-bottom:1px solid var(--line);
  display:flex;gap:4px;padding:8px 10px;overflow-x:auto;scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{display:none}
.tab{
  white-space:nowrap;padding:8px 14px;border-radius:10px;font-size:14px;font-weight:500;
  color:var(--muted);background:transparent;transition:.15s;
}
.tab.active{background:var(--brand);color:#fff;font-weight:700}
.content{padding:16px;max-width:760px;margin:0 auto;padding-bottom:60px}

/* ===== Cards & lists ===== */
.panel-head{display:flex;align-items:center;gap:10px;margin:2px 0 16px;flex-wrap:wrap}
.panel-head h2{margin:0;font-size:19px;font-weight:800;flex:1}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.urow{display:flex;align-items:center;gap:12px}
.uavatar{width:42px;height:42px;border-radius:12px;background:var(--surface-2);color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;border:1px solid var(--line)}
.uinfo{flex:1;min-width:0}
.uinfo .uname{font-weight:700;font-size:15.5px}
.uinfo .umeta{color:var(--muted);font-size:12.5px;margin-top:1px}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.pill.role{background:#E8EEF8;color:var(--brand-2)}
.pill.off{background:#FDECEB;color:var(--danger-d)}
.pill.on{background:#E5F6F3;color:var(--accent-d)}
.row-actions{display:flex;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:9px;background:var(--surface-2);color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line)}
.icon-btn.del{color:var(--danger)}
.empty{text-align:center;color:var(--muted);padding:40px 16px}
.empty .e-emoji{font-size:34px;display:block;margin-bottom:8px;opacity:.6}
.sub-note{color:var(--muted);font-size:13px;margin:-6px 0 14px}
.divider{height:1px;background:var(--line);margin:16px 0}
.set-block{margin-bottom:10px}
.set-block h3{margin:0 0 4px;font-size:15.5px;font-weight:700}
.set-block p{margin:0 0 10px;color:var(--muted);font-size:13px}

/* ===== Modal ===== */
.modal-back{position:fixed;inset:0;background:rgba(22,35,63,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:var(--surface);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
@media(min-width:600px){.modal-back{align-items:center;padding:20px}.modal{border-radius:22px}}
.modal h2{margin:0 0 16px;font-size:18px;font-weight:800}
.modal-row{display:flex;gap:10px;margin-top:6px}
.modal-row .btn{flex:1}

/* permissions tree */
.perm-tree{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:4px}
.perm-grp{border-bottom:1px solid var(--line)}
.perm-grp:last-child{border-bottom:none}
.perm-grp>.perm-head{background:var(--surface-2);padding:9px 12px;font-weight:700;font-size:14px}
.perm-leaf{display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid var(--line);flex-wrap:wrap}
.perm-leaf.sub{padding-right:26px;background:#FCFDFE}
.perm-leaf .pl-name{flex:1;font-size:13.5px;min-width:120px}
.perm-leaf label.chk{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--muted);font-weight:500}
.perm-leaf input[type=checkbox]{width:17px;height:17px;accent-color:var(--accent)}
.chip-toggle{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.chip{padding:8px 16px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface-2);font-weight:600;font-size:14px;color:var(--muted)}
.chip.active{border-color:var(--accent);background:#E5F6F3;color:var(--accent-d)}
.chip.locked{opacity:.45;pointer-events:none}
.toast{position:fixed;bottom:24px;right:50%;transform:translateX(50%);background:var(--brand);color:#fff;padding:11px 20px;border-radius:24px;font-size:14px;font-weight:500;z-index:80;box-shadow:var(--shadow);opacity:0;transition:opacity .2s,transform .2s}
.toast.show{opacity:1;transform:translateX(50%) translateY(-4px)}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--muted);font-size:15px}
.spin{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin-left:10px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ===== Loading ===== -->
<div id="bootView" class="loading"><span class="spin"></span> جارٍ التحميل…</div>

<!-- ===== Login ===== -->
<div id="loginView" class="auth-wrap hidden">
  <div class="auth-card">
    <div class="brand-mark">ف</div>
    <h1>نظام الفصول الدراسية</h1>
    <p class="auth-sub">سجّل الدخول للمتابعة</p>
    <div id="loginAlert"></div>
    <div class="field"><label>اسم المستخدم</label><input id="liUser" autocomplete="username" placeholder="اسم المستخدم"></div>
    <div class="field"><label>كلمة المرور</label><input id="liPass" type="password" autocomplete="current-password" placeholder="كلمة المرور"></div>
    <div class="field"><label>الفترة</label>
      <select id="liPeriod"><option value="first">الفترة الأولى</option><option value="second">الفترة الثانية</option></select>
    </div>
    <button class="btn" id="liBtn">دخول</button>
  </div>
</div>

<!-- ===== Change password ===== -->
<div id="pwView" class="auth-wrap hidden">
  <div class="auth-card">
    <div class="brand-mark">🔑</div>
    <h1>تغيير كلمة المرور</h1>
    <p class="auth-sub" id="pwHint">يُنصح بتغيير كلمة المرور عند أول دخول</p>
    <div id="pwAlert"></div>
    <div class="field"><label>كلمة المرور الحالية</label><input id="pwOld" type="password" placeholder="الحالية"></div>
    <div class="field"><label>كلمة المرور الجديدة</label><input id="pwNew" type="password" placeholder="الجديدة"></div>
    <div class="field"><label>تأكيد الجديدة</label><input id="pwNew2" type="password" placeholder="أعد كتابتها"></div>
    <button class="btn" id="pwBtn">حفظ كلمة المرور</button>
    <button class="btn ghost" id="pwSkip" style="margin:8px auto 0;display:block">تخطٍّ الآن</button>
  </div>
</div>

<!-- ===== App ===== -->
<div id="appView" class="hidden">
  <div class="topbar">
    <div class="tb-title" id="tbTitle">نظام الفصول</div>
    <span class="tb-badge" id="tbPeriod"></span>
    <button class="tb-menu-btn" id="tbMenu" title="القائمة">☰</button>
  </div>
  <div class="tabbar" id="tabbar"></div>
  <div class="content" id="content"></div>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
<script>
/* =========================================================================
   نظام الفصول الدراسية — المرحلة الأولى (index.html)
   الدخول · المستخدمون · إعدادات النظام · المدارس · الفترة · تغيير كلمة المرور
   ========================================================================= */

/* إعدادات Firebase — مشروع classroom-system-dc213 (مطابقة لـ omr.html) */
const firebaseConfig = {
  apiKey: "AIzaSyAqrz2MEU5prnyjkY6oR_7kSjyavb3GvkE",
  authDomain: "classroom-system-dc213.firebaseapp.com",
  projectId: "classroom-system-dc213",
  storageBucket: "classroom-system-dc213.firebasestorage.app",
  messagingSenderId: "157418234040",
  appId: "1:157418234040:web:0027f85eddae38ac45544d"
};

let db = null;
try { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); }
catch(e){ console.error('Firebase init', e); }

/* ---------- الأدوار ---------- */
const ROLES = {
  admin:    'أدمن',
  manager:  'مدير',
  agent:    'وكيل',
  counselor:'موجه طلابي',
  assistant:'مساعد إداري',
  teacher:  'معلم'
};

/* ---------- شجرة الصلاحيات ---------- */
const PERM_TREE = [
  { key:'index', label:'الصفحة الرئيسية', leaves:[
    { key:'index.classes',  label:'الفصول والطلاب' },
    { key:'index.sent',     label:'الملاحظات المرسلة' },
    { key:'index.received', label:'الملاحظات الواردة' },
    { key:'index.absence',  label:'غياب الطلاب' },
    { key:'index.users',    label:'المستخدمون' },
    { key:'index.settings', label:'إعدادات النظام' },
  ]},
  { key:'omr', label:'صفحة التصحيح الآلي (omr)', leaves:[
    { key:'omr.classes',        label:'الفصول والطلاب', sub:false },
    { key:'omr.classes.manual', label:'إضافة يدوية', sub:true },
    { key:'omr.classes.noor',   label:'استيراد من نور', sub:true },
    { key:'omr.design',  label:'التصميم' },
    { key:'omr.grade',   label:'التصحيح' },
    { key:'omr.results', label:'النتائج' },
    { key:'omr.worklog', label:'سجل الأعمال' },
  ]},
];
const ALL_PERM_KEYS = PERM_TREE.flatMap(g=>g.leaves.map(l=>l.key));

/* القوالب الافتراضية للصلاحيات حسب الدور */
function defaultPerms(role){
  const p = {}; ALL_PERM_KEYS.forEach(k=>p[k]={access:false,edit:false,del:false});
  const grant=(k,e,d)=>{ if(p[k]) p[k]={access:true,edit:!!e,del:!!d}; };
  if(role==='admin'){ ALL_PERM_KEYS.forEach(k=>p[k]={access:true,edit:true,del:true}); }
  else if(role==='teacher'){ ['omr.classes','omr.classes.manual','omr.classes.noor','omr.design','omr.grade','omr.results','omr.worklog'].forEach(k=>grant(k,true,true)); }
  else if(role==='agent'||role==='counselor'){ ['index.classes','index.sent','index.received','index.absence'].forEach(k=>grant(k,true,false)); }
  // مدير / مساعد إداري: بلا صلاحيات افتراضية (تُسند يدوياً)
  return p;
}

/* مفاتيح تبويبات index التي يتحكم بها العرض */
const INDEX_TABS = [
  { key:'classes',  perm:'index.classes',  label:'الفصول والطلاب' },
  { key:'sent',     perm:'index.sent',     label:'الملاحظات المرسلة' },
  { key:'received', perm:'index.received', label:'الملاحظات الواردة' },
  { key:'absence',  perm:'index.absence',  label:'غياب الطلاب' },
  { key:'users',    perm:'index.users',    label:'المستخدمون' },
  { key:'settings', perm:'index.settings', label:'إعدادات النظام' },
];

/* ---------- حالة ---------- */
let SESSION = null;     // {userId, username, role, schoolId, period}
let CURRENT = null;     // كائن المستخدم الكامل
let SCHOOLS = {};       // سجل المدارس
let activeTab = null;

/* ---------- أدوات ---------- */
const $ = s=>document.querySelector(s);
const esc = s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function show(view){ ['bootView','loginView','pwView','appView'].forEach(v=>$('#'+v).classList.toggle('hidden',v!==view)); }
function alertBox(id,type,msg){ $('#'+id).innerHTML = msg?`<div class="alert ${type}">${esc(msg)}</div>`:''; }
let toastT;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }
const periodLabel = p=> p==='second'?'الفترة الثانية':'الفترة الأولى';

/* ---------- Firestore: مراجع ثابتة (لا مجموعات جديدة) ---------- */
const usersCol   = ()=>db.collection('users');
const schoolsDoc = ()=>db.collection('schoolData').doc('schools'); // سجل واحد بكل المدارس (map)

/* ========================================================================
   التهيئة
   ======================================================================== */
async function boot(){
  if(!db){ show('loginView'); alertBox('loginAlert','err','تعذّر الاتصال بقاعدة البيانات. تحقق من إعدادات Firebase في أعلى الكود.'); return; }
  try{
    await ensureSeed();
    await loadSchools();
    const saved = JSON.parse(localStorage.getItem('cls_session')||'null');
    if(saved && saved.userId){
      const snap = await usersCol().doc(saved.userId).get();
      if(snap.exists){ SESSION=saved; CURRENT={id:snap.id,...snap.data()}; enterApp(); return; }
    }
    show('loginView');
  }catch(e){ console.error(e); show('loginView'); alertBox('loginAlert','err','خطأ في التحميل: '+e.message); }
}

/* إنشاء أدمن افتراضي + سجل مدارس فارغ عند أول تشغيل */
async function ensureSeed(){
  const sd = await schoolsDoc().get();
  if(!sd.exists){ await schoolsDoc().set({ list:{} }); }
  const adminQ = await usersCol().where('role','==','admin').limit(1).get();
  if(adminQ.empty){
    await usersCol().add({
      username:'admin', password:'admin123', role:'admin', schoolId:null,
      assignedClasses:[], permissions:defaultPerms('admin'),
      mustChangePassword:true, active:true,
      createdAt:Date.now(), updatedAt:Date.now()
    });
  }
}

async function loadSchools(){
  const sd = await schoolsDoc().get();
  SCHOOLS = (sd.exists && sd.data().list) ? sd.data().list : {};
}

/* ========================================================================
   الدخول
   ======================================================================== */
$('#liBtn').onclick = doLogin;
$('#liPass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
async function doLogin(){
  const u=$('#liUser').value.trim(), p=$('#liPass').value, period=$('#liPeriod').value;
  if(!u||!p){ alertBox('loginAlert','err','أدخل اسم المستخدم وكلمة المرور'); return; }
  $('#liBtn').textContent='جارٍ الدخول…'; $('#liBtn').disabled=true;
  try{
    const q = await usersCol().where('username','==',u).limit(1).get();
    if(q.empty){ throw new Error('اسم المستخدم غير موجود'); }
    const doc=q.docs[0], data=doc.data();
    if(data.password!==p){ throw new Error('كلمة المرور غير صحيحة'); }
    if(data.active===false){ throw new Error('هذا الحساب معطّل. راجع المسؤول'); }
    // التحقق من تجميد الفترة لغير الأدمن
    if(data.role!=='admin' && data.schoolId && SCHOOLS[data.schoolId]){
      const sc=SCHOOLS[data.schoolId];
      if(sc.activePeriod && sc.activePeriod!==period){
        throw new Error('الفترة '+periodLabel(period)+' غير مُفعّلة لمدرستك حالياً');
      }
    }
    CURRENT={id:doc.id,...data};
    SESSION={ userId:doc.id, username:data.username, role:data.role, schoolId:data.schoolId||null, period };
    localStorage.setItem('cls_session',JSON.stringify(SESSION));
    if(data.mustChangePassword){ openChangePw(true); }
    else enterApp();
  }catch(e){ alertBox('loginAlert','err',e.message); }
  finally{ $('#liBtn').textContent='دخول'; $('#liBtn').disabled=false; }
}

function logout(){ localStorage.removeItem('cls_session'); SESSION=null; CURRENT=null; $('#liPass').value=''; alertBox('loginAlert','',''); show('loginView'); }

/* ========================================================================
   تغيير كلمة المرور
   ======================================================================== */
let pwForced=false;
function openChangePw(forced){
  pwForced=!!forced;
  $('#pwHint').textContent = forced ? 'يُنصح بتغيير كلمة المرور عند أول دخول' : 'أدخل كلمة المرور الحالية ثم الجديدة';
  $('#pwSkip').classList.toggle('hidden',!forced);
  $('#pwOld').value=$('#pwNew').value=$('#pwNew2').value=''; alertBox('pwAlert','','');
  show('pwView');
}
$('#pwSkip').onclick = ()=> enterApp();
$('#pwBtn').onclick = async ()=>{
  const o=$('#pwOld').value, n=$('#pwNew').value, n2=$('#pwNew2').value;
  if(o!==CURRENT.password){ alertBox('pwAlert','err','كلمة المرور الحالية غير صحيحة'); return; }
  if(n.length<4){ alertBox('pwAlert','err','كلمة المرور الجديدة قصيرة جداً'); return; }
  if(n!==n2){ alertBox('pwAlert','err','التأكيد لا يطابق الجديدة'); return; }
  try{
    await usersCol().doc(CURRENT.id).update({ password:n, mustChangePassword:false, updatedAt:Date.now() });
    CURRENT.password=n; CURRENT.mustChangePassword=false;
    toast('تم تغيير كلمة المرور'); enterApp();
  }catch(e){ alertBox('pwAlert','err',e.message); }
};

/* ========================================================================
   دخول التطبيق + التبويبات
   ======================================================================== */
function visibleTabs(){
  if(CURRENT.role==='admin') return INDEX_TABS.slice();
  return INDEX_TABS.filter(t=>{
    const pm=CURRENT.permissions||{};
    if(t.key==='users'||t.key==='settings') return false; // للأدمن فقط
    return pm[t.perm] && pm[t.perm].access;
  });
}
function enterApp(){
  show('appView');
  const school = CURRENT.schoolId && SCHOOLS[CURRENT.schoolId] ? SCHOOLS[CURRENT.schoolId].name : 'لوحة الأدمن';
  $('#tbTitle').textContent = school;
  $('#tbPeriod').textContent = periodLabel(SESSION.period);
  const tabs=visibleTabs();
  const bar=$('#tabbar'); bar.innerHTML='';
  tabs.forEach(t=>{
    const b=document.createElement('button'); b.className='tab'; b.textContent=t.label;
    b.onclick=()=>{ activeTab=t.key; renderTabs(); renderPanel(); };
    bar.appendChild(b);
  });
  if(!tabs.find(t=>t.key===activeTab)) activeTab = tabs.length?tabs[0].key:null;
  renderTabs(); renderPanel();
}
function renderTabs(){
  [...$('#tabbar').children].forEach((b,i)=> b.classList.toggle('active', visibleTabs()[i] && visibleTabs()[i].key===activeTab));
}
$('#tbMenu').onclick = openMenu;
function openMenu(){
  modal(`<h2>القائمة</h2>
    <div class="card" style="margin:0 0 10px"><div class="urow">
      <div class="uavatar">${esc((CURRENT.username||'?')[0])}</div>
      <div class="uinfo"><div class="uname">${esc(CURRENT.username)}</div>
      <div class="umeta">${esc(ROLES[CURRENT.role]||CURRENT.role)} · ${esc(periodLabel(SESSION.period))}</div></div>
    </div></div>
    <button class="btn secondary" id="mPw" style="margin-bottom:8px">تغيير كلمة المرور</button>
    <button class="btn" id="mOmr" style="margin-bottom:8px">الانتقال إلى صفحة التصحيح (omr)</button>
    <button class="btn danger" id="mOut">تسجيل الخروج</button>
    <button class="btn ghost" style="margin:10px auto 0;display:block" onclick="closeModal()">إغلاق</button>`);
  $('#mPw').onclick=()=>{ closeModal(); openChangePw(false); };
  $('#mOmr').onclick=()=>{ window.location.href='omr.html'; };
  $('#mOut').onclick=()=>{ closeModal(); logout(); };
}

/* ========================================================================
   عرض اللوحات
   ======================================================================== */
function renderPanel(){
  const c=$('#content');
  if(activeTab==='users')      return renderUsers(c);
  if(activeTab==='settings')   return renderSettings(c);
  const labels={classes:'الفصول والطلاب',sent:'الملاحظات المرسلة',received:'الملاحظات الواردة',absence:'غياب الطلاب'};
  c.innerHTML=`<div class="panel-head"><h2>${esc(labels[activeTab]||'')}</h2></div>
    <div class="empty"><span class="e-emoji">🚧</span>هذا التبويب قيد التطوير في المرحلة القادمة.</div>`;
}

/* ---------------- تبويب المستخدمون (للأدمن) ---------------- */
async function renderUsers(c){
  c.innerHTML=`<div class="panel-head"><h2>المستخدمون</h2>
    <button class="btn sm" id="addUserBtn">+ إضافة مستخدم</button></div>
    <div class="sub-note">إدارة حسابات جميع المدارس وصلاحياتها.</div>
    <div id="uFilter" class="card" style="padding:12px"></div>
    <div id="usersList"><div class="empty"><span class="spin"></span></div></div>`;
  $('#addUserBtn').onclick=()=>openUserModal(null);

  // فلتر المدرسة
  const opts = ['<option value="">كل المدارس</option>']
    .concat(Object.entries(SCHOOLS).map(([id,s])=>`<option value="${esc(id)}">${esc(s.name)}</option>`)).join('');
  $('#uFilter').innerHTML=`<div class="field" style="margin:0"><label>عرض حسب المدرسة</label><select id="uSchoolFilter">${opts}</select></div>`;
  $('#uSchoolFilter').onchange=loadUsersList;
  loadUsersList();
}
async function loadUsersList(){
  const wrap=$('#usersList'); const filter=$('#uSchoolFilter')?$('#uSchoolFilter').value:'';
  try{
    const snap = await usersCol().get();
    let users = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(filter) users = users.filter(u=>u.schoolId===filter);
    users.sort((a,b)=>(a.role==='admin'?-1:0)-(b.role==='admin'?-1:0));
    if(!users.length){ wrap.innerHTML=`<div class="empty"><span class="e-emoji">👥</span>لا يوجد مستخدمون بعد.</div>`; return; }
    wrap.innerHTML = users.map(u=>{
      const sc = u.schoolId&&SCHOOLS[u.schoolId]?SCHOOLS[u.schoolId].name:(u.role==='admin'?'— كل المدارس —':'بلا مدرسة');
      const isMe = u.id===CURRENT.id;
      return `<div class="card"><div class="urow">
        <div class="uavatar">${esc((u.username||'?')[0])}</div>
        <div class="uinfo">
          <div class="uname">${esc(u.username)} ${isMe?'<span class="pill role">أنت</span>':''}</div>
          <div class="umeta"><span class="pill role">${esc(ROLES[u.role]||u.role)}</span> · ${esc(sc)}</div>
        </div>
        <span class="pill ${u.active===false?'off':'on'}">${u.active===false?'معطّل':'مُفعّل'}</span>
        <div class="row-actions">
          <button class="icon-btn" onclick="openUserModal('${u.id}')" title="تعديل">✏️</button>
          ${u.role==='admin'?'':`<button class="icon-btn del" onclick="deleteUser('${u.id}','${esc(u.username)}')" title="حذف">🗑</button>`}
        </div></div></div>`;
    }).join('');
  }catch(e){ wrap.innerHTML=`<div class="alert err">${esc(e.message)}</div>`; }
}

let editUser=null, editPerms=null;
async function openUserModal(id){
  editUser = null; 
  if(id){ const s=await usersCol().doc(id).get(); editUser={id:s.id,...s.data()}; }
  const e = editUser;
  editPerms = e ? JSON.parse(JSON.stringify(e.permissions||defaultPerms(e.role))) : defaultPerms('teacher');
  const schoolOpts = Object.entries(SCHOOLS).map(([sid,s])=>`<option value="${esc(sid)}" ${e&&e.schoolId===sid?'selected':''}>${esc(s.name)}</option>`).join('');
  const roleOpts = Object.entries(ROLES).filter(([k])=>k!=='admin').map(([k,v])=>`<option value="${k}" ${e&&e.role===k?'selected':''}>${esc(v)}</option>`).join('');
  modal(`<h2>${e?'تعديل مستخدم':'إضافة مستخدم'}</h2>
    <div id="umAlert"></div>
    <div class="field"><label>المدرسة</label><select id="umSchool">
      <option value="">— اختر المدرسة —</option>${schoolOpts}</select></div>
    <div class="field"><label>اسم المستخدم</label><input id="umUser" value="${e?esc(e.username):''}" placeholder="فريد لكل الموقع"></div>
    <div class="field"><label>كلمة المرور</label><input id="umPass" value="${e?esc(e.password):''}" placeholder="كلمة المرور"></div>
    <div class="field"><label>الدور</label><select id="umRole">${roleOpts}</select></div>
    <div class="field"><label>الفصول المسندة <span style="color:var(--muted);font-weight:400">(افصل بفاصلة)</span></label>
      <input id="umClasses" value="${e&&e.assignedClasses?esc(e.assignedClasses.join('، ')):''}" placeholder="مثال: ١٠٨، ٢٠٣"></div>
    <div class="field" style="margin-bottom:6px"><label>الحالة</label>
      <div class="chip-toggle"><button type="button" class="chip ${!e||e.active!==false?'active':''}" id="umActive">مُفعّل</button>
      <button type="button" class="chip ${e&&e.active===false?'active':''}" id="umInactive">معطّل</button></div></div>
    <div class="divider"></div>
    <label style="font-weight:700;font-size:14px">الصفحات والصلاحيات</label>
    <div class="sub-note" style="margin-top:4px">حدّد الوصول، ولكل بند: يسمح بالتعديل / الحذف.</div>
    <div class="perm-tree" id="permTree"></div>
    <div class="modal-row" style="margin-top:16px">
      <button class="btn secondary" onclick="closeModal()">إلغاء</button>
      <button class="btn" id="umSave">حفظ</button>
    </div>`);
  let activeState = !(e&&e.active===false);
  $('#umActive').onclick=()=>{activeState=true;$('#umActive').classList.add('active');$('#umInactive').classList.remove('active');};
  $('#umInactive').onclick=()=>{activeState=false;$('#umInactive').classList.add('active');$('#umActive').classList.remove('active');};
  $('#umRole').onchange=()=>{ editPerms=defaultPerms($('#umRole').value); renderPermTree(); toast('طُبِّقت صلاحيات الدور الافتراضية'); };
  renderPermTree();
  $('#umSave').onclick=()=>saveUser(activeState);
}
function renderPermTree(){
  const root=$('#permTree'); if(!root) return;
  root.innerHTML = PERM_TREE.map(g=>`<div class="perm-grp">
    <div class="perm-head">${esc(g.label)}</div>
    ${g.leaves.map(l=>{
      const p=editPerms[l.key]||{access:false,edit:false,del:false};
      return `<div class="perm-leaf ${l.sub?'sub':''}">
        <span class="pl-name">${l.sub?'↳ ':''}${esc(l.label)}</span>
        <label class="chk"><input type="checkbox" data-k="${l.key}" data-f="access" ${p.access?'checked':''}> وصول</label>
        <label class="chk"><input type="checkbox" data-k="${l.key}" data-f="edit" ${p.edit?'checked':''}> تعديل</label>
        <label class="chk"><input type="checkbox" data-k="${l.key}" data-f="del" ${p.del?'checked':''}> حذف</label>
      </div>`;
    }).join('')}
  </div>`).join('');
  root.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.onchange=()=>{ const k=cb.dataset.k,f=cb.dataset.f;
      editPerms[k]=editPerms[k]||{access:false,edit:false,del:false}; editPerms[k][f]=cb.checked;
      if(f!=='access'&&cb.checked){ editPerms[k].access=true; renderPermTree(); }
    };
  });
}
async function saveUser(active){
  const school=$('#umSchool').value, user=$('#umUser').value.trim(), pass=$('#umPass').value,
        role=$('#umRole').value,
        classes=$('#umClasses').value.split(/[،,]/).map(s=>s.trim()).filter(Boolean);
  if(!school){ alertBox('umAlert','err','اختر المدرسة'); return; }
  if(!user){ alertBox('umAlert','err','أدخل اسم المستخدم'); return; }
  if(!pass){ alertBox('umAlert','err','أدخل كلمة المرور'); return; }
  try{
    // فحص تفرّد اسم المستخدم
    const q=await usersCol().where('username','==',user).get();
    const clash=q.docs.find(d=> d.id!==(editUser&&editUser.id));
    if(clash){ alertBox('umAlert','err','اسم المستخدم مستخدم مسبقاً، اختر غيره'); return; }
    const payload={ username:user, password:pass, role, schoolId:school, assignedClasses:classes,
      permissions:editPerms, active, updatedAt:Date.now() };
    if(editUser){ await usersCol().doc(editUser.id).update(payload); toast('تم تحديث المستخدم'); }
    else { payload.mustChangePassword=true; payload.createdAt=Date.now(); await usersCol().add(payload); toast('تمت إضافة المستخدم'); }
    closeModal(); loadUsersList();
  }catch(e){ alertBox('umAlert','err',e.message); }
}
async function deleteUser(id,name){
  confirmModal('حذف مستخدم', `سيُحذف المستخدم «${name}» نهائياً. متابعة؟`, async()=>{
    try{ await usersCol().doc(id).delete(); toast('تم الحذف'); loadUsersList(); }
    catch(e){ toast('خطأ: '+e.message); }
  }, true);
}

/* ---------------- تبويب إعدادات النظام (للأدمن) ---------------- */
function renderSettings(c){
  c.innerHTML=`<div class="panel-head"><h2>إعدادات النظام</h2></div>

    <div class="card">
      <div class="set-block"><h3>المدارس</h3><p>أنشئ المدارس وأدر فتراتها. كل مدرسة معزولة تماماً.</p></div>
      <button class="btn sm" id="addSchoolBtn">+ إضافة مدرسة</button>
      <div id="schoolsList" style="margin-top:12px"></div>
    </div>

    <div class="card">
      <div class="set-block"><h3>حذف بيانات مستخدم</h3><p>حذف حساب مستخدم محدد من النظام.</p></div>
      <button class="btn secondary sm" onclick="activeTab='users';renderTabs();renderPanel()">الذهاب إلى المستخدمين</button>
    </div>

    <div class="card" style="border-color:#F3D6D4">
      <div class="set-block"><h3 style="color:var(--danger-d)">مسح جميع البيانات</h3>
        <p>يحذف كل المدارس والمستخدمين (عدا حسابك كأدمن). لا يمكن التراجع.</p></div>
      <button class="btn danger sm" id="wipeBtn">مسح جميع البيانات</button>
    </div>`;
  $('#addSchoolBtn').onclick=()=>openSchoolModal(null);
  $('#wipeBtn').onclick=wipeAll;
  renderSchoolsList();
}
function renderSchoolsList(){
  const wrap=$('#schoolsList');
  const entries=Object.entries(SCHOOLS);
  if(!entries.length){ wrap.innerHTML=`<div class="empty" style="padding:24px"><span class="e-emoji">🏫</span>لا توجد مدارس بعد.</div>`; return; }
  wrap.innerHTML=entries.map(([id,s])=>`<div class="card" style="box-shadow:none;margin-bottom:8px">
    <div class="urow">
      <div class="uavatar">🏫</div>
      <div class="uinfo"><div class="uname">${esc(s.name)}</div>
        <div class="umeta">${esc(s.year||'—')} · الفترة المُفعّلة: ${esc(periodLabel(s.activePeriod||'first'))} · فصول: ${esc(s.classCount||'—')}</div></div>
      <div class="row-actions">
        <button class="icon-btn" onclick="openSchoolModal('${esc(id)}')" title="تعديل">✏️</button>
        <button class="icon-btn del" onclick="deleteSchool('${esc(id)}','${esc(s.name)}')" title="حذف">🗑</button>
      </div></div></div>`).join('');
}
function openSchoolModal(id){
  const s = id?SCHOOLS[id]:{name:'',year:'',activePeriod:'first',classCount:''};
  modal(`<h2>${id?'تعديل مدرسة':'إضافة مدرسة'}</h2>
    <div id="smAlert"></div>
    <div class="field"><label>اسم المدرسة</label><input id="smName" value="${esc(s.name)}" placeholder="اسم المدرسة"></div>
    <div class="field"><label>العام الدراسي</label><input id="smYear" value="${esc(s.year||'')}" placeholder="مثال: ١٤٤٧/١٤٤٨ هـ"></div>
    <div class="field"><label>الفترة المُفعّلة</label>
      <select id="smPeriod">
        <option value="first" ${s.activePeriod!=='second'?'selected':''}>الفترة الأولى</option>
        <option value="second" ${s.activePeriod==='second'?'selected':''}>الفترة الثانية</option>
      </select>
      <div class="sub-note" style="margin-top:6px">تفعيل فترة يمنع غير الأدمن من دخول الأخرى؛ تبقى الفترة السابقة متاحة للأدمن للاطلاع.</div></div>
    <div class="field"><label>عدد الفصول الدراسية</label><input id="smCount" type="number" inputmode="numeric" value="${esc(s.classCount||'')}" placeholder="مثال: ١٢"></div>
    <div class="modal-row" style="margin-top:14px">
      <button class="btn secondary" onclick="closeModal()">إلغاء</button>
      <button class="btn" id="smSave">حفظ</button>
    </div>`);
  $('#smSave').onclick=async()=>{
    const name=$('#smName').value.trim();
    if(!name){ alertBox('smAlert','err','أدخل اسم المدرسة'); return; }
    const sid = id || ('s'+Date.now().toString(36));
    SCHOOLS[sid]={ name, year:$('#smYear').value.trim(), activePeriod:$('#smPeriod').value, classCount:$('#smCount').value.trim() };
    try{ await schoolsDoc().set({list:SCHOOLS}); toast(id?'تم تحديث المدرسة':'تمت إضافة المدرسة'); closeModal(); renderSchoolsList(); }
    catch(e){ alertBox('smAlert','err',e.message); }
  };
}
function deleteSchool(id,name){
  confirmModal('حذف مدرسة',`سيُحذف سجل المدرسة «${name}». (لن يحذف هذا حسابات مستخدميها). متابعة؟`,async()=>{
    delete SCHOOLS[id];
    try{ await schoolsDoc().set({list:SCHOOLS}); toast('تم حذف المدرسة'); renderSchoolsList(); }
    catch(e){ toast('خطأ: '+e.message); }
  },true);
}
function wipeAll(){
  confirmModal('مسح جميع البيانات','اكتب «تصفير» للتأكيد. سيُحذف كل شيء عدا حسابك.',async(val)=>{
    if(val!=='تصفير'){ toast('لم تتم الكتابة بشكل صحيح'); return; }
    try{
      const snap=await usersCol().get();
      const batch=db.batch();
      snap.docs.forEach(d=>{ if(d.id!==CURRENT.id) batch.delete(d.ref); });
      await batch.commit();
      SCHOOLS={}; await schoolsDoc().set({list:{}});
      toast('تم مسح البيانات'); renderSettings($('#content'));
    }catch(e){ toast('خطأ: '+e.message); }
  },true,true);
}

/* ========================================================================
   نوافذ منبثقة عامة
   ======================================================================== */
function modal(html){ $('#modalRoot').innerHTML=`<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`; }
function closeModal(){ $('#modalRoot').innerHTML=''; }
function confirmModal(title,msg,onYes,danger,withInput){
  modal(`<h2>${esc(title)}</h2><p style="color:var(--muted);margin:0 0 14px">${esc(msg)}</p>
    ${withInput?'<div class="field"><input id="cmInput" placeholder="اكتب هنا"></div>':''}
    <div class="modal-row">
      <button class="btn secondary" onclick="closeModal()">إلغاء</button>
      <button class="btn ${danger?'danger':''}" id="cmYes">تأكيد</button>
    </div>`);
  $('#cmYes').onclick=()=>{ const v=withInput?($('#cmInput').value||'').trim():null; closeModal(); onYes(v); };
}

boot();
</script>
