<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>نظام الفصول الدراسية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f8f7; --surface:#ffffff; --surface-2:#eef4f3;
  --brand:#0f766e; --brand-2:#0b5a54; --accent:#0f766e; --accent-d:#0b5a54;
  --ink:#15242b; --muted:#5b6f76; --line:#d8e2e0;
  --danger:#d64545; --danger-d:#b5332e; --warn:#c9870a; --ok:#1f9d55;
  --r:16px; --r-sm:11px; --shadow:0 1px 2px rgba(16,40,40,.06),0 8px 24px rgba(16,40,40,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Tajawal',"Segoe UI",Tahoma,system-ui,sans-serif;background:var(--bg);color:var(--ink);
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;
}
button{font-family:inherit;cursor:pointer;border:none}
input,select{font-family:inherit;font-size:15px}
.hidden{display:none !important}

/* ===== Login ===== */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}
.auth-card{
  width:100%;max-width:400px;background:var(--surface);border-radius:22px;
  box-shadow:var(--shadow);padding:34px 26px 30px;border:1px solid var(--line);
}
.brand-mark{
  width:64px;height:64px;border-radius:18px;margin:0 auto 16px;display:flex;
  align-items:center;justify-content:center;
  background:linear-gradient(150deg,var(--brand),var(--brand-2));color:#fff;font-weight:800;font-size:26px;
}
.auth-card h1{margin:0 0 4px;text-align:center;font-size:21px;font-weight:800}
.auth-sub{text-align:center;color:var(--muted);margin:0 0 24px;font-size:13.5px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
.field input,.field select{
  width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:var(--r-sm);
  background:var(--surface-2);transition:border-color .15s,background .15s;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);background:#fff}
.btn{
  width:100%;padding:14px;border-radius:var(--r-sm);font-weight:700;font-size:15.5px;
  background:var(--accent);color:#fff;transition:background .15s,transform .05s;
}
.btn:active{transform:scale(.99)}
.btn:hover{background:var(--accent-d)}
.btn.secondary{background:var(--surface-2);color:var(--brand);border:1.5px solid var(--line)}
.btn.secondary:hover{background:#EEF2F7}
.btn.danger{background:var(--danger)}.btn.danger:hover{background:var(--danger-d)}
.btn.sm{width:auto;padding:9px 16px;font-size:14px;border-radius:9px}
.btn.ghost{background:transparent;color:var(--muted);width:auto;padding:8px 12px;font-size:13.5px}
.alert{padding:11px 14px;border-radius:10px;font-size:13.5px;margin-bottom:14px;font-weight:500}
.alert.err{background:#FDECEB;color:var(--danger-d)}
.alert.ok{background:#E5F6F3;color:var(--accent-d)}
.alert.warn{background:#FCF2E2;color:#9A6212}

/* ===== App shell ===== */
.topbar{
  position:sticky;top:0;z-index:30;background:var(--brand);color:#fff;
  padding:12px 16px;display:flex;align-items:center;gap:12px;
}
.topbar .tb-title{font-weight:800;font-size:16px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-badge{background:rgba(255,255,255,.14);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.tb-menu-btn{background:rgba(255,255,255,.14);color:#fff;width:38px;height:38px;border-radius:11px;font-size:17px;display:flex;align-items:center;justify-content:center}
.tabbar{
  position:sticky;top:62px;z-index:20;background:var(--surface);border-bottom:1px solid var(--line);
  display:flex;gap:4px;padding:8px 10px;overflow-x:auto;scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{display:none}
.tab{
  white-space:nowrap;padding:8px 14px;border-radius:10px;font-size:14px;font-weight:500;
  color:var(--muted);background:transparent;transition:.15s;
}
.tab.active{background:var(--brand);color:#fff;font-weight:700}
.content{padding:16px;max-width:760px;margin:0 auto;padding-bottom:60px}

/* ===== Cards & lists ===== */
.panel-head{display:flex;align-items:center;gap:10px;margin:2px 0 16px;flex-wrap:wrap}
.panel-head h2{margin:0;font-size:19px;font-weight:800;flex:1}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.urow{display:flex;align-items:center;gap:12px}
.uavatar{width:42px;height:42px;border-radius:12px;background:var(--surface-2);color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;border:1px solid var(--line)}
.uinfo{flex:1;min-width:0}
.uinfo .uname{font-weight:700;font-size:15.5px}
.uinfo .umeta{color:var(--muted);font-size:12.5px;margin-top:1px}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.pill.role{background:#E8EEF8;color:var(--brand-2)}
.pill.off{background:#FDECEB;color:var(--danger-d)}
.pill.on{background:#E5F6F3;color:var(--accent-d)}
.row-actions{display:flex;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:9px;background:var(--surface-2);color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line)}
.icon-btn.del{color:var(--danger)}
.empty{text-align:center;color:var(--muted);padding:40px 16px}
.empty .e-emoji{font-size:34px;display:block;margin-bottom:8px;opacity:.6}
.sub-note{color:var(--muted);font-size:13px;margin:-6px 0 14px}
.divider{height:1px;background:var(--line);margin:16px 0}
.set-block{margin-bottom:10px}
.set-block h3{margin:0 0 4px;font-size:15.5px;font-weight:700}
.set-block p{margin:0 0 10px;color:var(--muted);font-size:13px}

/* ===== Modal ===== */
.modal-back{position:fixed;inset:0;background:rgba(22,35,63,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:var(--surface);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
@media(min-width:600px){.modal-back{align-items:center;padding:20px}.modal{border-radius:22px}}
.modal h2{margin:0 0 16px;font-size:18px;font-weight:800}
.modal-row{display:flex;gap:10px;margin-top:6px}
.modal-row .btn{flex:1}

/* permissions tree */
.perm-tree{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:4px}
.perm-grp{border-bottom:1px solid var(--line)}
.perm-grp:last-child{border-bottom:none}
.perm-grp>.perm-head{background:var(--surface-2);padding:9px 12px;font-weight:700;font-size:14px}
.perm-leaf{display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid var(--line);flex-wrap:wrap}
.perm-leaf.sub{padding-right:26px;background:#FCFDFE}
.perm-leaf .pl-name{flex:1;font-size:13.5px;min-width:120px}
.perm-leaf label.chk{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--muted);font-weight:500}
.perm-leaf input[type=checkbox]{width:17px;height:17px;accent-color:var(--accent)}
.chip-toggle{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.chip{padding:8px 16px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface-2);font-weight:600;font-size:14px;color:var(--muted)}
.chip.active{border-color:var(--accent);background:#E5F6F3;color:var(--accent-d)}
.chip.locked{opacity:.45;pointer-events:none}
.toast{position:fixed;bottom:24px;right:50%;transform:translateX(50%);background:var(--brand);color:#fff;padding:11px 20px;border-radius:24px;font-size:14px;font-weight:500;z-index:80;box-shadow:var(--shadow);opacity:0;transition:opacity .2s,transform .2s}
.toast.show{opacity:1;transform:translateX(50%) translateY(-4px)}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--muted);font-size:15px}
.spin{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin-left:10px}
@keyframes sp{to{transform:rotate(360deg)}}
.m-grab{width:42px;height:4px;border-radius:99px;background:var(--line);margin:-4px auto 16px}
.m-head{display:flex;align-items:center;gap:14px;padding-bottom:16px;margin-bottom:14px;border-bottom:1px solid var(--line)}
.m-av{width:56px;height:56px;border-radius:17px;background:linear-gradient(150deg,var(--brand),var(--brand-2));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;flex-shrink:0}
.m-id{flex:1;min-width:0}
.m-id .nm{font-weight:800;font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-id .sb{color:var(--muted);font-size:13px;margin-top:2px}
.m-chip{display:inline-block;margin-top:7px;background:var(--surface-2);border:1px solid var(--line);color:var(--brand);padding:3px 11px;border-radius:20px;font-size:11.5px;font-weight:700}
.m-row{display:flex;align-items:center;gap:13px;width:100%;padding:13px;border-radius:15px;background:var(--surface-2);border:1px solid var(--line);margin-bottom:10px;font-family:inherit;text-align:right;transition:transform .1s,filter .12s;color:var(--ink)}
.m-row:active{transform:scale(.985)}
.m-row .mi{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;background:#fff;border:1px solid var(--line)}
.m-row .ml{flex:1;font-weight:700;font-size:15px}
.m-row .mc{color:var(--muted);font-size:20px;line-height:1}
.m-row.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.m-row.primary .mi{background:rgba(255,255,255,.18);border-color:transparent}
.m-row.primary .mc{color:rgba(255,255,255,.85)}
.m-row.danger{background:#FCECEA;border-color:#F2D4D0;color:var(--danger-d)}
.m-row.danger .mi{background:#fff;border-color:#F2D4D0}
.m-close{display:block;width:100%;text-align:center;color:var(--muted);background:transparent;padding:12px;font-weight:600;font-size:14px;margin-top:2px}
</style>
</head>
<body>

<!-- ===== Loading ===== -->
<div id="bootView" class="loading"><span class="spin"></span> جارٍ التحميل…</div>

<!-- ===== Login ===== -->
<div id="loginView" class="auth-wrap hidden">
  <div class="auth-card">
    <div class="brand-mark">ف</div>
    <h1>نظام الفصول الدراسية</h1>
    <p class="auth-sub">سجّل الدخول للمتابعة</p>
    <div id="loginAlert"></div>
    <div class="field"><label>اسم المستخدم</label><input id="liUser" autocomplete="username" placeholder="اسم المستخدم"></div>
    <div class="field"><label>كلمة المرور</label><input id="liPass" type="password" autocomplete="current-password" placeholder="كلمة المرور"></div>
    <div class="field"><label>الفترة</label>
      <select id="liPeriod"><option value="first">الفترة الأولى</option><option value="second">الفترة الثانية</option></select>
    </div>
    <button class="btn" id="liBtn">دخول</button>
  </div>
</div>

<!-- ===== Change password ===== -->
<div id="pwView" class="auth-wrap hidden">
  <div class="auth-card">
    <div class="brand-mark">🔑</div>
    <h1>تغيير كلمة المرور</h1>
    <p class="auth-sub" id="pwHint">يُنصح بتغيير كلمة المرور عند أول دخول</p>
    <div id="pwAlert"></div>
    <div class="field"><label>كلمة المرور الحالية</label><input id="pwOld" type="password" placeholder="الحالية"></div>
    <div class="field"><label>كلمة المرور الجديدة</label><input id="pwNew" type="password" placeholder="الجديدة"></div>
    <div class="field"><label>تأكيد الجديدة</label><input id="pwNew2" type="password" placeholder="أعد كتابتها"></div>
    <button class="btn" id="pwBtn">حفظ كلمة المرور</button>
    <button class="btn ghost" id="pwSkip" style="margin:8px auto 0;display:block">تخطٍّ الآن</button>
  </div>
</div>

<!-- ===== App ===== -->
<div id="appView" class="hidden">
  <div class="topbar">
    <div class="tb-title" id="tbTitle">نظام الفصول</div>
    <span class="tb-badge" id="tbPeriod"></span>
    <button class="tb-menu-btn" id="tbMenu" title="القائمة">☰</button>
  </div>
  <div class="tabbar" id="tabbar"></div>
  <div class="content" id="content"></div>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
/* =========================================================================
   نظام الفصول الدراسية — المرحلة الأولى (index.html)
   الدخول · المستخدمون · إعدادات النظام · المدارس · الفترة · تغيير كلمة المرور
   ========================================================================= */

/* إعدادات Firebase — مشروع classroom-system-dc213 (مطابقة لـ omr.html) */
const firebaseConfig = {
  apiKey: "AIzaSyAqrz2MEU5prnyjkY6oR_7kSjyavb3GvkE",
  authDomain: "classroom-system-dc213.firebaseapp.com",
  projectId: "classroom-system-dc213",
  storageBucket: "classroom-system-dc213.firebasestorage.app",
  messagingSenderId: "157418234040",
  appId: "1:157418234040:web:0027f85eddae38ac45544d"
};

let db = null;
try { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); }
catch(e){ console.error('Firebase init', e); }

/* ---------- الأدوار ---------- */
const ROLES = {
  admin:    'أدمن',
  manager:  'مدير',
  agent:    'وكيل',
  counselor:'موجه طلابي',
  assistant:'مساعد إداري',
  teacher:  'معلم'
};

/* ---------- شجرة الصلاحيات ---------- */
const PERM_TREE = [
  { key:'index', label:'الصفحة الرئيسية', leaves:[
    { key:'index.classes',  label:'الفصول والطلاب' },
    { key:'index.sent',     label:'الملاحظات المرسلة' },
    { key:'index.received', label:'الملاحظات الواردة' },
    { key:'index.absence',  label:'غياب الطلاب' },
    { key:'index.users',    label:'المستخدمون' },
    { key:'index.settings', label:'إعدادات النظام' },
  ]},
  { key:'omr', label:'صفحة التصحيح الآلي (omr)', leaves:[
    { key:'omr.classes',        label:'الفصول والطلاب', sub:false },
    { key:'omr.classes.manual', label:'إضافة يدوية', sub:true },
    { key:'omr.classes.noor',   label:'استيراد من نور', sub:true },
    { key:'omr.design',  label:'التصميم' },
    { key:'omr.grade',   label:'التصحيح' },
    { key:'omr.results', label:'النتائج' },
    { key:'omr.worklog', label:'سجل الأعمال' },
  ]},
];
const ALL_PERM_KEYS = PERM_TREE.flatMap(g=>g.leaves.map(l=>l.key));

/* القوالب الافتراضية للصلاحيات حسب الدور */
function defaultPerms(role){
  const p = {}; ALL_PERM_KEYS.forEach(k=>p[k]={access:false,edit:false,del:false});
  const set=(k,a,e,d)=>{ if(p[k]) p[k]={access:!!a,edit:!!e,del:!!d}; };
  if(role==='admin'){ ALL_PERM_KEYS.forEach(k=>p[k]={access:true,edit:true,del:true}); return p; }
  if(role==='manager'){            // الرئيسية كاملة عدا المستخدمون/الإعدادات — مشاهدة فقط
    ['index.classes','index.sent','index.received','index.absence'].forEach(k=>set(k,true,false,false));
  } else if(role==='agent'){        // وكيل: وصول+تعديل (المرسلة، الواردة، الغياب)
    ['index.sent','index.received','index.absence'].forEach(k=>set(k,true,true,false));
  } else if(role==='counselor'){    // موجه: وصول+تعديل (المرسلة، الواردة) + مشاهدة (الغياب)
    ['index.sent','index.received'].forEach(k=>set(k,true,true,false));
    set('index.absence',true,false,false);
  } else if(role==='assistant'){    // مساعد إداري: وصول+تعديل (الفصول والطلاب، الغياب)
    ['index.classes','index.absence'].forEach(k=>set(k,true,true,false));
  } else if(role==='teacher'){      // معلم: المرسلة/الواردة + صفحة التصحيح كاملة
    ['index.sent','index.received'].forEach(k=>set(k,true,true,false));
    ['omr.classes','omr.classes.manual','omr.classes.noor','omr.design','omr.grade','omr.results','omr.worklog'].forEach(k=>set(k,true,true,true));
  }
  return p;
}

/* مفاتيح تبويبات index التي يتحكم بها العرض */
const INDEX_TABS = [
  { key:'classes',  perm:'index.classes',  label:'الفصول والطلاب' },
  { key:'sent',     perm:'index.sent',     label:'الملاحظات المرسلة' },
  { key:'received', perm:'index.received', label:'الملاحظات الواردة' },
  { key:'absence',  perm:'index.absence',  label:'غياب الطلاب' },
  { key:'users',    perm:'index.users',    label:'المستخدمون' },
  { key:'settings', perm:'index.settings', label:'إعدادات النظام' },
];

/* ---------- حالة ---------- */
let SESSION = null;     // {userId, username, role, schoolId, period}
let CURRENT = null;     // كائن المستخدم الكامل
let SCHOOLS = {};       // سجل المدارس
let activeTab = null;

/* ---------- أدوات ---------- */
const $ = s=>document.querySelector(s);
const esc = s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function show(view){ ['bootView','loginView','pwView','appView'].forEach(v=>$('#'+v).classList.toggle('hidden',v!==view)); }
function alertBox(id,type,msg){ $('#'+id).innerHTML = msg?`<div class="alert ${type}">${esc(msg)}</div>`:''; }
let toastT;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }
const periodLabel = p=> p==='second'?'الفترة الثانية':'الفترة الأولى';

/* ---------- Firestore: مراجع ثابتة (لا مجموعات جديدة) ---------- */
const usersCol   = ()=>db.collection('users');
const schoolsDoc = ()=>db.collection('schoolData').doc('schools'); // سجل واحد بكل المدارس (map)

/* ========================================================================
   التهيئة
   ======================================================================== */
async function boot(){
  if(!db){ show('loginView'); alertBox('loginAlert','err','تعذّر الاتصال بقاعدة البيانات. تحقق من إعدادات Firebase في أعلى الكود.'); return; }
  try{
    await ensureSeed();
    await loadSchools();
    const saved = JSON.parse(localStorage.getItem('cls_session')||'null');
    if(saved && saved.userId){
      const snap = await usersCol().doc(saved.userId).get();
      if(snap.exists){ SESSION=saved; CURRENT={id:snap.id,...snap.data()}; enterApp(); return; }
    }
    show('loginView');
  }catch(e){ console.error(e); show('loginView'); alertBox('loginAlert','err','خطأ في التحميل: '+e.message); }
}

/* إنشاء أدمن افتراضي + سجل مدارس فارغ عند أول تشغيل */
async function ensureSeed(){
  const sd = await schoolsDoc().get();
  if(!sd.exists){ await schoolsDoc().set({ list:{} }); }
  const adminQ = await usersCol().where('role','==','admin').limit(1).get();
  if(adminQ.empty){
    await usersCol().add({
      username:'admin', password:'admin123', role:'admin', schoolId:null,
      assignedClasses:[], permissions:defaultPerms('admin'),
      mustChangePassword:true, active:true,
      createdAt:Date.now(), updatedAt:Date.now()
    });
  }
}

async function loadSchools(){
  const sd = await schoolsDoc().get();
  SCHOOLS = (sd.exists && sd.data().list) ? sd.data().list : {};
}

/* ========================================================================
   الدخول
   ======================================================================== */
$('#liBtn').onclick = doLogin;
$('#liPass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
async function doLogin(){
  const u=$('#liUser').value.trim(), p=$('#liPass').value, period=$('#liPeriod').value;
  if(!u||!p){ alertBox('loginAlert','err','أدخل اسم المستخدم وكلمة المرور'); return; }
  $('#liBtn').textContent='جارٍ الدخول…'; $('#liBtn').disabled=true;
  try{
    const q = await usersCol().where('username','==',u).limit(1).get();
    if(q.empty){ throw new Error('اسم المستخدم غير موجود'); }
    const doc=q.docs[0], data=doc.data();
    if(data.password!==p){ throw new Error('كلمة المرور غير صحيحة'); }
    if(data.active===false){ throw new Error('هذا الحساب معطّل. راجع المسؤول'); }
    // التحقق من تجميد الفترة لغير الأدمن
    if(data.role!=='admin' && data.schoolId && SCHOOLS[data.schoolId]){
      const sc=SCHOOLS[data.schoolId];
      if(sc.activePeriod && sc.activePeriod!==period){
        throw new Error('الفترة '+periodLabel(period)+' غير مُفعّلة لمدرستك حالياً');
      }
    }
    CURRENT={id:doc.id,...data};
    SESSION={ userId:doc.id, username:data.username, role:data.role, schoolId:data.schoolId||null, period };
    localStorage.setItem('cls_session',JSON.stringify(SESSION));
    if(data.mustChangePassword){ openChangePw(true); }
    else enterApp();
  }catch(e){ alertBox('loginAlert','err',e.message); }
  finally{ $('#liBtn').textContent='دخول'; $('#liBtn').disabled=false; }
}

function logout(){ localStorage.removeItem('cls_session'); SESSION=null; CURRENT=null; $('#liPass').value=''; alertBox('loginAlert','',''); show('loginView'); }

let pwForced=false;
function openChangePw(forced){
  pwForced=!!forced;
  $('#pwHint').textContent = forced ? 'يُنصح بتغيير كلمة المرور عند أول دخول' : 'أدخل كلمة المرور الحالية ثم الجديدة';
  $('#pwSkip').classList.toggle('hidden',!forced);
  $('#pwOld').value=$('#pwNew').value=$('#pwNew2').value=''; alertBox('pwAlert','','');
  show('pwView');
}
$('#pwSkip').onclick = ()=> enterApp();
$('#pwBtn').onclick = async ()=>{

  if(o!==CURRENT.password){ alertBox('pwAlert','err','كلمة المرور الحالية غير صحيحة'); return; }

function visibleTabs(){
  if(CURRENT.role==='admin') return INDEX_TABS.slice();
  return INDEX_TABS.filter(t=>{
    const pm=CURRENT.permissions||{};
    if(t.key==='users'||t.key==='settings') return false; // للأدمن فقط
    return pm[t.perm] && pm[t.perm].access;
  });
}
function enterApp(){
  show('appView');
  const school = CURRENT.schoolId && SCHOOLS[CURRENT.schoolId] ? SCHOOLS[CURRENT.schoolId].name : 'لوحة الأدمن';
  $('#tbTitle').textContent = school;
  $('#tbPeriod').textContent = periodLabel(SESSION.period);
  const tabs=visibleTabs();
  const bar=$('#tabbar'); bar.innerHTML='';
  tabs.forEach(t=>{
    const b=document.createElement('button'); b.className='tab'; b.textContent=t.label;
    b.onclick=()=>{ activeTab=t.key; renderTabs(); renderPanel(); };
    bar.appendChild(b);
  });
  if(!tabs.find(t=>t.key===activeTab)) activeTab = tabs.length?tabs[0].key:null;
  renderTabs(); renderPanel();
  watchActive();
}
let _activeUnsub=null;
function watchActive(){
  if(_activeUnsub){ try{_activeUnsub();}catch(e){} _activeUnsub=null; }
  if(!CURRENT||!CURRENT.id||CURRENT.role==='admin') return;
  _activeUnsub = usersCol().doc(CURRENT.id).onSnapshot(snap=>{
    if(!snap.exists || snap.data().active===false){
      try{_activeUnsub&&_activeUnsub();}catch(e){} _activeUnsub=null;
      logout(); alertBox('loginAlert','err','تم تعطيل حسابك من قبل المسؤول.');
    }
  }, ()=>{});
}
function renderTabs(){
  [...$('#tabbar').children].forEach((b,i)=> b.classList.toggle('active', visibleTabs()[i] && visibleTabs()[i].key===activeTab));
}

async function loadModalClasses(schoolId, pre){

  if(!classes.length){ host.innerHTML='<div class="sub-note" style="margin:0">لا توجد فصول في روستر هذه المدرسة بعد. أضِفها من تبويب «الفصول والطلاب».</div>'; return; }
  const preset=(pre||[]).map(String);

    '<label style="display:flex;align-items:center;gap:6px;padding:8px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface-2);font-weight:600;font-size:13.5px;cursor:pointer">'+
    '<input type="checkbox" class="umCls" value="'+esc(c.code)+'" '+(preset.includes(String(c.code))?'checked':'')+' style="width:17px;height:17px;accent-color:var(--accent)">'+esc(c.name)+'</label>'
  ).join('')+'</div>';

function renderPermTree(){
  const root=$('#permTree'); if(!root) return;
  root.innerHTML = PERM_TREE.map(g=>`<div class="perm-grp">
    <div class="perm-head">${esc(g.label)}</div>
    ${g.leaves.map(l=>{
      const p=editPerms[l.key]||{access:false,edit:false,del:false};
      return `<div class="perm-leaf ${l.sub?'sub':''}">
        <span class="pl-name">${l.sub?'↳ ':''}${esc(l.label)}</span>
        <label class="chk"><input type="checkbox" data-k="${l.key}" data-f="access" ${p.access?'checked':''}> وصول</label>
        <label class="chk"><input type="checkbox" data-k="${l.key}" data-f="edit" ${p.edit?'checked':''}> تعديل</label>
        <label class="chk"><input type="checkbox" data-k="${l.key}" data-f="del" ${p.del?'checked':''}> حذف</label>
      </div>`;
    }).join('')}
  </div>`).join('');
  root.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.onchange=()=>{ const k=cb.dataset.k,f=cb.dataset.f;
      editPerms[k]=editPerms[k]||{access:false,edit:false,del:false}; editPerms[k][f]=cb.checked;
      if(f!=='access'&&cb.checked){ editPerms[k].access=true; renderPermTree(); }
    };
  });
}
async function saveUser(active){
  const school=$('#umSchool').value, user=$('#umUser').value.trim(), pass=$('#umPass').value,
        role=$('#umRole').value,
        classes=[...document.querySelectorAll('.umCls:checked')].map(x=>x.value);
  if(!school){ alertBox('umAlert','err','اختر المدرسة'); return; }
  if(!user){ alertBox('umAlert','err','أدخل اسم المستخدم'); return; }
  if(!pass){ alertBox('umAlert','err','أدخل كلمة المرور'); return; }
  try{
    // فحص تفرّد اسم المستخدم
    const q=await usersCol().where('username','==',user).get();
    const clash=q.docs.find(d=> d.id!==(editUser&&editUser.id));
    if(clash){ alertBox('umAlert','err','اسم المستخدم مستخدم مسبقاً، اختر غيره'); return; }
    const payload={ username:user, password:pass, role, schoolId:school, assignedClasses:classes,
      permissions:editPerms, active, updatedAt:Date.now() };
    if(editUser){ await usersCol().doc(editUser.id).update(payload); toast('تم تحديث المستخدم'); }
    else { payload.mustChangePassword=true; payload.createdAt=Date.now(); await usersCol().add(payload); toast('تمت إضافة المستخدم'); }
    closeModal(); loadUsersList();
  }catch(e){ alertBox('umAlert','err',e.message); }
}
async function deleteUser(id,name){

    try{ await usersCol().doc(id).delete(); toast('تم الحذف'); loadUsersList(); }
    catch(e){ toast('خطأ: '+e.message); }
  }, true);
}

function wipeAll(){
  confirmModal('مسح جميع البيانات','اكتب «تصفير» للتأكيد. سيُحذف كل شيء عدا حسابك.',async(val)=>{
    if(val!=='تصفير'){ toast('لم تتم الكتابة بشكل صحيح'); return; }
    try{
      const snap=await usersCol().get();
      const batch=db.batch();
      snap.docs.forEach(d=>{ if(d.id!==CURRENT.id) batch.delete(d.ref); });
      await batch.commit();
      SCHOOLS={}; await schoolsDoc().set({list:{}});

function addClassR(){
  const name=($('#rClName').value||'').trim(), code=($('#rClCode').value||'').trim();
  if(!name||!code){ toast('أدخل اسم الفصل ورمزه'); return; }
  if(RClasses.some(c=>c.code===code)){ toast('رمز الفصل مستخدم مسبقاً'); return; }
  RClasses.push({name,code}); saveRoster().then(()=>{ paintClasses(); toast('أُضيف الفصل'); });

function pasteImport(){
  const code=$('#rPasteCl').value; if(!code){ toast('اختر الفصل أولاً'); return; }
  const lines=($('#rPaste').value||'').split('\n').map(l=>l.trim()).filter(Boolean);
  let n=0;
  const dups=[];
  lines.forEach(line=>{
    const m=normalizeDigits(line).match(/(\d{6,})/);
    const seat=m?m[1]:'';
    const name=cleanCell(normalizeDigits(line).replace(/\d{6,}/,''));
    if(!name||name.length<3) return;
    const r=upsertStudentR({seat,name,classCode:code});
    if(r.status==='dup') dups.push({name,seat,cls:clsName(r.dupClass)}); else n++;
  });
  if(n||dups.length){ saveRoster().then(()=>{ paintClasses(); if(dups.length) alertDupes(dups,n); else toast('استُورد '+n+' طالب'); }); $('#rPaste').value=''; }
  else toast('لم يُعثر على أسماء صالحة');
}
function upsertStudentR(st){
  if(st.seat){
    const ex=RStudents.find(x=>x.seat===st.seat);
    if(ex){
      if(String(ex.classCode)===String(st.classCode)){ ex.name=st.name; return {status:'updated'}; }
      return {status:'dup', dupClass:ex.classCode};   // موجود في صف آخر
    }
  }
  RStudents.push(st); return {status:'added'};
}
function clsName(code){ return (RClasses.find(c=>String(c.code)===String(code))||{}).name||code; }
function alertDupes(dups, added){

  modal('<h2>تنبيه: طلاب مكرّرون</h2><p style="color:var(--muted);margin:0 0 8px">لا يمكن وجود الطالب في أكثر من صف (رقم الهوية مفتاح فريد). تم تجاهل '+dups.length+' طالباً، وأُضيف '+added+'.</p><div style="max-height:42vh;overflow:auto">'+list+'</div><button class="btn" style="margin-top:12px" onclick="closeModal()">حسناً</button>');
}

async function delStudent(seat,code){

function onSchoolXlsx(ev){
  const file=ev.target.files&&ev.target.files[0]; ev.target.value='';
  if(!file) return;
  if(typeof XLSX==='undefined'){ toast('مكتبة Excel لم تُحمّل بعد'); return; }
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      let grade='',section='',allStudents=[];const seen={};
      wb.SheetNames.forEach(sn=>{ const ws=wb.Sheets[sn]; if(!ws)return;
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,defval:''});
        const p=parseExcelRoster(rows);
        if(!grade&&p.grade)grade=p.grade; if(!section&&p.section)section=p.section;
        (p.students||[]).forEach(st=>{ const key=st.seat||('name:'+st.name); if(seen[key])return; seen[key]=1; allStudents.push(st); });
      });
      if(!allStudents.length){ toast('لم يُعثر على طلاب صالحين في الملف'); return; }
      let className=grade||''; if(section) className=(className?className+' ':'')+section; if(!className)className='صف';
      pendingGroups=[{className,students:allStudents,code:suggestClassCode(grade,section)}];
      showImpReview();
    }catch(err){ toast('تعذّرت قراءة الملف: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}
function showImpReview(){
  const host=$('#rImpReview'); if(!host) return;
  host.innerHTML = pendingGroups.map((g,i)=>
    '<div class="card" style="box-shadow:none;background:var(--surface-2);margin-top:10px">'+
    '<div class="uname" style="margin-bottom:8px">'+esc(g.className)+' — '+g.students.length+' طالب</div>'+
    '<div class="field" style="margin:0"><label>رمز الفصل</label><input id="rgc-'+i+'" value="'+esc(g.code)+'" placeholder="مثال: 108"></div>'+
    '</div>').join('') +
    '<button class="btn sm" id="rImpConfirm" style="margin-top:10px">✅ تأكيد الاستيراد وإنشاء الفصل</button>';
  $('#rImpConfirm').onclick=confirmImpReview;
}
async function confirmImpReview(){
  let total=0; const dups=[];
  pendingGroups.forEach((g,i)=>{
    const code=(($('#rgc-'+i)||{}).value||'').trim(); if(!code) return;
    if(!RClasses.some(c=>String(c.code)===String(code))) RClasses.push({name:g.className,code});
    g.students.forEach(st=>{
      const r=upsertStudentR({seat:st.seat,name:st.name,classCode:code});
      if(r.status==='dup') dups.push({name:st.name,seat:st.seat,cls:clsName(r.dupClass)}); else total++;
    });
  });
  if(!total && !dups.length){ toast('أدخل رمز الفصل'); return; }
  await saveRoster(); pendingGroups=null; paintClasses();
  if(dups.length) alertDupes(dups,total); else toast('استُورد '+total+' طالب');
}

/* ---- محلّل نور (منقول حرفياً من omr.html لمطابقة السلوك) ---- */
function normalizeDigits(s){ return String(s||'').replace(/[٠-٩]/g,d=>'0123456789'['٠١٢٣٤٥٦٧٨٩'.indexOf(d)]).replace(/[۰-۹]/g,d=>'0123456789'['۰۱۲۳۴۵۶۷۸۹'.indexOf(d)]); }
function normalizeSeat(s){ return String(s||'').replace(/[٠-٩]/g,d=>'0123456789'['٠١٢٣٤٥٦٧٨٩'.indexOf(d)]).replace(/\D/g,''); }
function cleanCell(s){ return String(s||'').replace(/[|:：ـ]/g,' ').replace(/\s+/g,' ').trim(); }
function suggestClassCode(grade, section){
  const g=String(grade||''); let base=0;
  if(/الأول|اول|الاول/.test(g)) base=100;
  else if(/الثاني|ثاني/.test(g)) base=200;
  else if(/الثالث|ثالث/.test(g)) base=300;
  const sec=parseInt(normalizeDigits(String(section||'')).replace(/[^0-9]/g,''),10);
  if(base && !isNaN(sec)) return String(base+sec);
  return '';
}
function parseExcelRoster(rows){
  if(!rows || !rows.length) return { students:[] };
  const cell=(r,c)=>(rows[r]&&rows[r][c]!=null)?String(rows[r][c]).trim():'';
  const headerValueOf=(labelRe)=>{
    for(let r=0;r<Math.min(rows.length,20);r++){
      const row=rows[r]||[]; let labelCol=-1;
      row.forEach((c,ci)=>{ const t=String(c==null?'':c).trim(); if(t&&labelRe.test(t)&&labelCol<0) labelCol=ci; });
      if(labelCol<0) continue;
      let best='',bestDist=1e9;
      row.forEach((c,ci)=>{ const t=String(c==null?'':c).trim();
        if(!t||t===':'||t==='：') return; if(labelRe.test(t)) return;
        if(/المملكة|وزارة|الإدارة|الادارة|العامة|بمنطقة/.test(t)) return;
        const d=Math.abs(ci-labelCol); if(d<bestDist){ bestDist=d; best=t; } });
      if(best) return best;
    }
    return '';
  };
  let headerIdx=-1,nameCol=-1,idCol=-1;
  for(let r=0;r<rows.length;r++){
    const row=rows[r]||[]; let nC=-1,iC=-1;
    row.forEach((c,ci)=>{ const t=String(c==null?'':c).trim();
      if(/^الاسم$/.test(t)||/اسم الطالب/.test(t)) nC=ci;
      if(/السجل المدني|رقم الهوية|الهوية|السجل/.test(t)) iC=ci; });
    if(nC>=0&&iC>=0){ headerIdx=r; nameCol=nC; idCol=iC; break; }
  }
  let grade=headerValueOf(/^الصف$/), section=headerValueOf(/^الفصل$/);
  const secDigits=normalizeDigits(section).replace(/[^0-9]/g,''); if(secDigits) section=secDigits;
  const students=[]; const seen={};
  if(headerIdx>=0){
    for(let r=headerIdx+1;r<rows.length;r++){
      const name=cleanCell(cell(r,nameCol)); let seat=normalizeSeat(cell(r,idCol));
      if(!name||name.replace(/\s/g,'').length<3) continue;
      if(/الاسم|السجل|المدني/.test(name)) continue;
      if(seat&&seen[seat]) continue; if(seat) seen[seat]=1;
      students.push({seat,name});
    }
    return { students, grade, section };
  }
  let hIdx=-1,iC=-1,nC=-1,cC=-1;
  for(let r=0;r<Math.min(rows.length,6);r++){
    (rows[r]||[]).forEach((c,ci)=>{ const t=String(c||'').trim();
      if(/هوية|سجل|مدني|رقم/.test(t)&&iC<0){iC=ci;hIdx=r;}
      if(/اسم|الطالب/.test(t)&&nC<0){nC=ci;hIdx=r;}
      if(/صف|فصل/.test(t)&&cC<0)cC=ci; });
    if(iC>=0&&nC>=0)break;
  }
  const start=hIdx>=0?hIdx+1:0;
  for(let r=start;r<rows.length;r++){
    const row=rows[r]||[]; if(!row.length)continue;
    let seat='',name='';
    if(iC>=0||nC>=0){
      seat=normalizeSeat(row[iC>=0?iC:0]);
      name=cleanCell(String(row[nC>=0?nC:1]!=null?row[nC>=0?nC:1]:''));
    }else{
      const idc=row.findIndex(c=>normalizeSeat(c).length>=9);
      seat=idc>=0?normalizeSeat(row[idc]):'';
      name=cleanCell(row.filter((c,i)=>i!==idc).map(c=>String(c||'').trim()).filter(x=>/[أ-ي]/.test(x)).sort((a,b)=>b.length-a.length)[0]||'');
    }
    if(!name||name.length<3)continue;
    if(seat&&seen[seat])continue; if(seat)seen[seat]=1;
    students.push({seat,name});
  }
  return { students, grade, section };
}

   نظام الملاحظات — المرسلة / الواردة + التوجيه التلقائي
   ======================================================================== */
const notesCol = ()=>db.collection('notes');
const _normN = x=>String(x||'').replace(/[٠-٩]/g,d=>'0123456789'['٠١٢٣٤٥٦٧٨٩'.indexOf(d)]).trim();

async function resolveRecipients(opts){
  const snap = await usersCol().where('schoolId','==',opts.schoolId).get();
  const users = snap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.active!==false && u.id!==CURRENT.id);
  const hasClass=u=>(u.assignedClasses||[]).map(_normN).includes(_normN(opts.classCode));
  let recs=[];
  if(opts.kind==='toTeacher') recs=users.filter(u=>u.role==='teacher'&&hasClass(u));
  else if(opts.kind==='toPeers'){ const other=opts.fromRole==='agent'?'counselor':'agent'; recs=users.filter(u=>u.role===other); }
  return recs.map(u=>({userId:u.id,name:u.username,role:u.role}));
}
async function createNote(n){
  const info=await resolveRecipients(n);
  if(!info.length) throw new Error('لا يوجد مستقبِل مؤهّل لهذه الملاحظة.');
  await notesCol().add({ schoolId:CURRENT.schoolId, period:SESSION.period,
    fromUserId:CURRENT.id, fromName:CURRENT.username, fromRole:CURRENT.role,
    recipients:info.map(r=>r.userId), recipientsInfo:info,
    scope:n.scope, studentSeat:n.studentSeat||'', studentName:n.studentName||'',
    classCode:n.classCode||'', className:n.className||'', text:n.text,
    createdAt:Date.now(), replies:[] });
}

  const reps=(n.replies||[]).map(r=>'<div style="border-top:1px solid var(--line);padding:6px 0;font-size:13px"><b>'+esc(r.fromName)+':</b> '+esc(r.text)+'</div>').join('');

async function replyNote(id){
  if(!can('index.received','edit') && !can('index.sent','edit')){ toast('ليس لديك صلاحية الرد (مشاهدة فقط).'); return; }
  const txt=prompt('اكتب ردّك:'); if(!txt||!txt.trim()) return;
  try{
    await notesCol().doc(id).update({ replies: firebase.firestore.FieldValue.arrayUnion(
      {fromUserId:CURRENT.id,fromName:CURRENT.username,fromRole:CURRENT.role,text:txt.trim(),at:Date.now()}) });
    toast('تم إرسال الرد'); (activeTab==='received'?renderReceived:renderSent)($('#content'));
  }catch(e){ toast('خطأ: '+e.message); }
}
async function renderSent(c){
  const canCompose = (CURRENT.role==='agent'||CURRENT.role==='counselor');
  c.innerHTML='<div class="panel-head"><h2>الملاحظات المرسلة</h2>'+(canCompose?'<button class="btn sm" id="composeBtn">+ ملاحظة جديدة</button>':'')+'</div><div id="notesList"><div class="empty"><span class="spin"></span></div></div>';
  if($('#composeBtn')) $('#composeBtn').onclick=openCompose;
  try{
    const snap=await notesCol().where('fromUserId','==',CURRENT.id).get();
    let arr=snap.docs.map(d=>({id:d.id,...d.data()})).filter(n=>n.period===SESSION.period).sort((a,b)=>b.createdAt-a.createdAt);
    $('#notesList').innerHTML = arr.length? arr.map(n=>noteCard(n,true)).join('') : '<div class="empty"><span class="e-emoji">📤</span>لا ملاحظات مرسلة.</div>';
  }catch(e){ $('#notesList').innerHTML='<div class="alert err">'+esc(e.message)+'</div>'; }
}
async function renderReceived(c){
  c.innerHTML='<div class="panel-head"><h2>الملاحظات الواردة</h2></div><div id="notesList"><div class="empty"><span class="spin"></span></div></div>';
  try{
    const snap=await notesCol().where('recipients','array-contains',CURRENT.id).get();
    let arr=snap.docs.map(d=>({id:d.id,...d.data()})).filter(n=>n.period===SESSION.period).sort((a,b)=>b.createdAt-a.createdAt);
    $('#notesList').innerHTML = arr.length? arr.map(n=>noteCard(n,false)).join('') : '<div class="empty"><span class="e-emoji">📥</span>لا ملاحظات واردة.</div>';
  }catch(e){ $('#notesList').innerHTML='<div class="alert err">'+esc(e.message)+'</div>'; }
}
let composeRoster={classes:[],students:[]};
async function openCompose(){
  try{ const s=await rosterDoc(CURRENT.schoolId).get(); const d=s.exists?JSON.parse(s.data().value||'{}'):{}; composeRoster={classes:d.classes||[],students:d.students||[]}; }
  catch(e){ composeRoster={classes:[],students:[]}; }
  const peerLabel = CURRENT.role==='agent' ? 'الموجّهين الطلابيين' : 'الوكلاء';
  modal('<h2>ملاحظة جديدة</h2><div id="cmpAlert"></div>'+
    '<div class="field"><label>نوع الملاحظة</label><select id="cmpKind">'+
      '<option value="toTeacher">عن طالب → إلى معلّمه</option>'+
      '<option value="toPeers">عامة → إلى '+esc(peerLabel)+'</option></select></div>'+
    '<div id="cmpStudentWrap">'+
      '<div class="field"><label>الفصل</label><select id="cmpClass"><option value="">— اختر —</option>'+composeRoster.classes.map(c=>'<option value="'+esc(c.code)+'">'+esc(c.name)+'</option>').join('')+'</select></div>'+
      '<div class="field"><label>الطالب</label><select id="cmpStudent"><option value="">— اختر الفصل أولاً —</option></select></div></div>'+
    '<div class="field"><label>نص الملاحظة</label><textarea id="cmpText" rows="4" style="width:100%;padding:12px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface-2);font-family:inherit"></textarea></div>'+
    '<div class="modal-row"><button class="btn secondary" onclick="closeModal()">إلغاء</button><button class="btn" id="cmpSend">إرسال</button></div>');
  const upd=()=>{ $('#cmpStudentWrap').style.display = $('#cmpKind').value==='toTeacher'?'block':'none'; };
  $('#cmpKind').onchange=upd; upd();
  $('#cmpClass').onchange=()=>{ const code=$('#cmpClass').value; const studs=composeRoster.students.filter(s=>String(s.classCode)===String(code));
    $('#cmpStudent').innerHTML='<option value="">— اختر —</option>'+studs.map(s=>'<option value="'+esc(s.seat)+'">'+esc(s.name)+'</option>').join(''); };
  $('#cmpSend').onclick=doCompose;
}
async function doCompose(){
  const kind=$('#cmpKind').value, text=($('#cmpText').value||'').trim();
  if(!text){ alertBox('cmpAlert','err','اكتب نص الملاحظة'); return; }
  const payload={kind, scope:kind==='toPeers'?'peers':'student', fromRole:CURRENT.role, schoolId:CURRENT.schoolId, text};
  if(kind==='toTeacher'){
    const code=$('#cmpClass').value, seat=$('#cmpStudent').value;
    if(!code||!seat){ alertBox('cmpAlert','err','اختر الفصل والطالب'); return; }
    const cl=composeRoster.classes.find(c=>String(c.code)===String(code))||{};
    const st=composeRoster.students.find(s=>String(s.seat)===String(seat)&&String(s.classCode)===String(code))||{};
    payload.classCode=code; payload.className=cl.name||''; payload.studentSeat=seat; payload.studentName=st.name||'';
  }
  try{ await createNote(payload); closeModal(); toast('تم الإرسال'); renderSent($('#content')); }
  catch(e){ alertBox('cmpAlert','err',e.message); }
}

boot();
</script>
